[wandb]
project = "rot|ppo_quadrotors"
group = ""
entity = "lsy-tum"

[env]
name = "DroneRacing-v0"
n_envs = 1024
n_eval_envs = 64

# Environment configuration is based on https://github.com/utiasDSL/lsy_drone_racing/blob/dev/config/level0.toml
[env.kwargs]
freq = 50                   # Frequency of the environment's step function, in Hz
sensor_range = 0.7          # Range at which the exact location of gates and obstacles become visible to the drone. Objects that are not in the drone's sensor range report their nominal position.
control_mode = "attitude"   # Control mode of the environment. Must be "attitude"
seed = 1337                 # Random seed
max_episode_steps = 1_500   # Maximum number of steps per episode before truncation
device = "cpu"              # Device used for the environment and the simulation

[env.kwargs.sim_config]
physics = "analytical"
camera_view = [5.0, -40.0, -40.0, 0.5, -1.0, 0.5]
freq = 500                                          # Simulation frequency, in Hz
attitude_freq = 500                                 # Controller frequency, in Hz. This frequency is used to simulate the onboard controller, NOT for the environment's step function
gui = false                                         # Enable/disable PyBullet's GUI

[env.kwargs.track]
# Tall gates: 1.0m height. Short gates: 0.525m height. Height is measured from the ground to the
# center of the gate.
[[env.kwargs.track.gates]]
pos = [0.45, -0.5, 0.56]
rpy = [0.0, 0.0, 2.35]
[[env.kwargs.track.gates]]
pos = [1.0, -1.05, 1.11]
rpy = [0.0, 0.0, -0.78]
[[env.kwargs.track.gates]]
pos = [0.0, 1.0, 0.56]
rpy = [0.0, 0.0, 0.0]
[[env.kwargs.track.gates]]
pos = [-0.5, 0.0, 1.11]
rpy = [0.0, 0.0, 3.14]

# Obstacle height: 1.4m. Height is measured from the ground to the top of the obstacle.
[[env.kwargs.track.obstacles]]
pos = [1.0, 0.0, 1.4]
[[env.kwargs.track.obstacles]]
pos = [0.5, -1.0, 1.4]
[[env.kwargs.track.obstacles]]
pos = [0.0, 1.5, 1.4]
[[env.kwargs.track.obstacles]]
pos = [-0.5, 0.5, 1.4]

[[env.kwargs.track.drones]]
pos = [1.0, 1.5, 0.07]
rpy = [0, 0, 0]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

# Action or dynamics disturbances disabled
# [env.kwargs.disturbances.action]
# fn = "normal"
# scale = 0.001

# Inertial parameters and gate randomizations disabled
# [env.kwargs.randomizations.drone_pos]
# fn = "uniform"
# [env.kwargs.randomizations.drone_pos.kwargs]
# minval = [-0.01, -0.01, 0.0]
# maxval = [0.01, 0.01, 0.01]

# [env.kwargs.randomizations.drone_rpy]
# fn = "uniform"
# [env.kwargs.randomizations.drone_rpy.kwargs]
# minval = [-0.01, -0.01, -0.01]
# maxval = [0.01, 0.01, 0.01]

[env.wrapper.kwargs]
action_type = "tangent"
obs_type = "matrix"
control_mode = "rel"

[env.reward.kwargs]     # https://wandb.ai/lsy-tum/rot|ppo_sweep/runs/eyqxnhie?nw=nwuseru1999168
progress_weight = 10.0
crash_weight = -3.64
vel_weight = -0.106
finished_weight = 10.0
action_weight = -8.22e-3

[ppo]
n_steps = 64                # period = 65_536
n_minibatches = 16          # batch_size = 4096
n_total_steps = 25_000_000  
actor_lr = 1.33e-4
critic_lr = 1.83e-4
n_epochs = 40

eval_period = 499_712
n_eval_steps = 96_000           # 64 * 1500
# checkpoint_period = 4_000    
# overwrite_policy = false

clip_coef = 0.070
ent_coef = 5.19e-6
vf_coef = 0.5
max_grad_norm = 1.0
target_kl = -1          # Toml doesn't support None
gamma = 0.9
norm_adv = true
clip_vloss = true
gae_lambda = 0.95
device = "cpu"
use_logstd_net = false

[overrides]
[overrides.tangent-matrix]  # https://wandb.ai/lsy-tum/rot|ppo_sweep/runs/4idxaq16?nw=nwuseru1999168
actor_lr = 1.626e-4
clip_coef = 0.260
critic_lr = 2.251e-4
ent_coef = 2.205e-5
gae_lambda = 0.929
gamma = 0.958
max_grad_norm = 1.758
n_epochs = 30
n_minibatches = 64
n_steps = 64

